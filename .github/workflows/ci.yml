name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

# Self-hosted runner trust boundary: jobs below run on a dedicated MacBook
# self-hosted runner (see ADR-0005), so they must never execute untrusted
# code. Each job's `if:` repeats the same guard — true for push events, and
# for pull_request events only when the PR's head repository is this same
# repository (not a fork). A workflow run triggered by a fork PR shows these
# jobs as skipped, not run unsafely. (GitHub Actions job-level `if:` cannot
# reference a workflow-level `env:`, so the expression is duplicated per job
# rather than defined once - a known limitation, not an oversight.)
#
# Why no actions/cache here: this runner is a persistent dedicated machine,
# not an ephemeral GitHub-hosted VM. pip's and npm's own local caches
# already survive between jobs on its disk without GitHub's remote
# actions/cache upload/download round-trip - that round-trip was previously
# found to hang indefinitely when pointed at a machine-wide cache directory
# (ISSUE-012). Removed proactively here rather than rediscovering the same
# failure on a second machine.

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      agent: ${{ steps.changes.outputs.agent }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Check for Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            agent:
              - 'agent/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend-test:
    needs: filter
    if: needs.filter.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, omeganexus-macbook]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No cache: input here - see note near the top of this file.
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest
      - name: Run backend tests
        run: python -m pytest backend/tests -v

  agent-test:
    needs: filter
    if: needs.filter.outputs.agent == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, omeganexus-macbook]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No cache: input here - see note near the top of this file.
      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pytest
      - name: Run agent tests
        run: python -m pytest agent/tests -v

  frontend-validate:
    needs: filter
    if: needs.filter.outputs.frontend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, omeganexus-macbook]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache: input here - see note near the top of this file.
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type-check and build
        working-directory: frontend
        run: npm run build
