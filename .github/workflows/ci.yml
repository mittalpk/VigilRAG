name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

# Self-hosted runner trust boundary: jobs below run on a self-hosted runner with
# access to this machine, so they must never execute untrusted code. Each job's
# `if:` repeats the same guard — true for push events, and for pull_request
# events only when the PR's head repository is this same repository (not a
# fork). A workflow run triggered by a fork PR shows these jobs as skipped,
# not run unsafely. (GitHub Actions job-level `if:` cannot reference a
# workflow-level `env:`, so the expression is duplicated per job rather than
# defined once — a known limitation, not an oversight.)
#
# Why no actions/cache on self-hosted: the setup-python/setup-node `cache:`
# input uploads/downloads pip's or npm's cache directory via GitHub's remote
# actions/cache service. On this persistent self-hosted runner that directory
# is the SAME machine-wide pip/npm cache every other project on this box
# shares (~/.cache/pip, ~/.npm) - not scoped to this repo - so it grew to
# several GB and hung a job trying to upload it (observed: stuck at "0.0%"
# indefinitely). pip and npm already read from that same local cache on
# every install regardless of actions/cache, and this runner's disk already
# persists between jobs, so the remote cache upload/download is pure
# redundant overhead here - removing it fixes the hang and loses nothing.

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      agent: ${{ steps.changes.outputs.agent }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Check for Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            agent:
              - 'agent/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend-test:
    needs: filter
    if: needs.filter.outputs.backend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No cache: input here - see "Why no actions/cache on self-hosted"
          # note near the top of this file.
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest
      - name: Run backend tests
        run: python -m pytest backend/tests -v

  agent-test:
    needs: filter
    if: needs.filter.outputs.agent == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No cache: input here - see "Why no actions/cache on self-hosted"
          # note near the top of this file.
      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pytest
      - name: Run agent tests
        run: python -m pytest agent/tests -v

  frontend-validate:
    needs: filter
    if: needs.filter.outputs.frontend == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache: input here - see "Why no actions/cache on self-hosted"
          # note near the top of this file.
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type-check and build
        working-directory: frontend
        run: npm run build
