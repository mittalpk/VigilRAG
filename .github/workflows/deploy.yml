name: Deploy OmegaNexus to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      agent: ${{ steps.changes.outputs.agent }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Check for Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'agent/**'
              - 'terraform/**'
              - '.github/workflows/deploy.yml'
            agent:
              - 'backend/**'
              - 'agent/**'
              - 'terraform/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'terraform/**'
              - '.github/workflows/deploy.yml'

  deploy-backend:
    needs: filter
    if: needs.filter.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set env vars
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Build and Push Backend
        run: |
          docker build -t ghcr.io/${{ env.OWNER_LC }}/omega-nexus-backend:${{ github.sha }} ./backend
          docker push ghcr.io/${{ env.OWNER_LC }}/omega-nexus-backend:${{ github.sha }}
      - name: Deploy Backend to Container App
        run: |
          az containerapp registry set \
            --name ca-omega-backend \
            --resource-group ${{ secrets.RG_NAME || 'rg-omega-nexus' }} \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GHCR_PAT }}
          # Set only secrets that exist in Key Vault (idempotent)
          az containerapp secret set \
            --name ca-omega-backend \
            --resource-group ${{ secrets.RG_NAME || 'rg-omega-nexus' }} \
            --secrets \
              "github-pat=keyvaultref:https://kv-omega-nexus-ecc63471.vault.azure.net/secrets/github-pat,identityref:/subscriptions/ecc63471-f21a-46af-a01f-2db799285343/resourcegroups/rg-omega-nexus/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-omega-nexus" \
              "azure-storage-connection-string=keyvaultref:https://kv-omega-nexus-ecc63471.vault.azure.net/secrets/azure-storage-connection-string,identityref:/subscriptions/ecc63471-f21a-46af-a01f-2db799285343/resourcegroups/rg-omega-nexus/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-omega-nexus" \
              "admin-username=keyvaultref:https://kv-omega-nexus-ecc63471.vault.azure.net/secrets/admin-username,identityref:/subscriptions/ecc63471-f21a-46af-a01f-2db799285343/resourcegroups/rg-omega-nexus/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-omega-nexus" \
              "admin-password=keyvaultref:https://kv-omega-nexus-ecc63471.vault.azure.net/secrets/admin-password,identityref:/subscriptions/ecc63471-f21a-46af-a01f-2db799285343/resourcegroups/rg-omega-nexus/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-omega-nexus" \
              "internal-api-key=keyvaultref:https://kv-omega-nexus-ecc63471.vault.azure.net/secrets/internal-api-key,identityref:/subscriptions/ecc63471-f21a-46af-a01f-2db799285343/resourcegroups/rg-omega-nexus/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-omega-nexus"
          az containerapp update \
            --name ca-omega-backend \
            --resource-group ${{ secrets.RG_NAME || 'rg-omega-nexus' }} \
            --image ghcr.io/${{ env.OWNER_LC }}/omega-nexus-backend:${{ github.sha }} \
            --min-replicas 1 \
            --max-replicas 5 \
            --set-env-vars \
              "GITHUB_PAT=secretref:github-pat" \
              "AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-connection-string" \
              "ADMIN_USERNAME=secretref:admin-username" \
              "ADMIN_PASSWORD=secretref:admin-password" \
              "INTERNAL_API_KEY=secretref:internal-api-key" \
              "AZURE_WIKI_CONTAINER=omega-wiki" \
              "AGENT_SERVICE_URL=https://ca-omega-agent.internal.gentlesea-072b973e.francecentral.azurecontainerapps.io"

  deploy-agent:
    needs: filter
    if: needs.filter.outputs.agent == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set env vars
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Build and Push Agent
        run: |
          docker build -t ghcr.io/${{ env.OWNER_LC }}/omega-nexus-agent:${{ github.sha }} ./agent
          docker push ghcr.io/${{ env.OWNER_LC }}/omega-nexus-agent:${{ github.sha }}
      - name: Deploy Agent to Container App
        run: |
          az containerapp registry set \
            --name ca-omega-agent \
            --resource-group ${{ secrets.RG_NAME || 'rg-omega-nexus' }} \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GHCR_PAT }}
          az containerapp secret set \
            --name ca-omega-agent \
            --resource-group ${{ secrets.RG_NAME || 'rg-omega-nexus' }} \
            --secrets \
              "gemini-api-key=keyvaultref:https://kv-omega-nexus-ecc63471.vault.azure.net/secrets/gemini-api-key,identityref:/subscriptions/ecc63471-f21a-46af-a01f-2db799285343/resourcegroups/rg-omega-nexus/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-omega-nexus" \
              "internal-api-key=keyvaultref:https://kv-omega-nexus-ecc63471.vault.azure.net/secrets/internal-api-key,identityref:/subscriptions/ecc63471-f21a-46af-a01f-2db799285343/resourcegroups/rg-omega-nexus/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-omega-nexus"
          az containerapp update \
            --name ca-omega-agent \
            --resource-group ${{ secrets.RG_NAME || 'rg-omega-nexus' }} \
            --image ghcr.io/${{ env.OWNER_LC }}/omega-nexus-agent:${{ github.sha }} \
            --min-replicas 1 \
            --max-replicas 10 \
            --set-env-vars \
              "GEMINI_API_KEY=secretref:gemini-api-key" \
              "INTERNAL_API_KEY=secretref:internal-api-key" \
              "BACKEND_URL=https://ca-omega-backend.gentlesea-072b973e.francecentral.azurecontainerapps.io"

  deploy-frontend:
    needs: filter
    if: needs.filter.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set env vars
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Build and Push Frontend
        run: |
          docker build -t ghcr.io/${{ env.OWNER_LC }}/omega-nexus-frontend:${{ github.sha }} \
            --build-arg VITE_BACKEND_URL=https://ca-omega-backend.gentlesea-072b973e.francecentral.azurecontainerapps.io \
            ./frontend
          docker push ghcr.io/${{ env.OWNER_LC }}/omega-nexus-frontend:${{ github.sha }}
      - name: Deploy Frontend to Container App
        run: |
          az containerapp registry set \
            --name ca-omega-frontend \
            --resource-group ${{ secrets.RG_NAME || 'rg-omega-nexus' }} \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GHCR_PAT }}
          az containerapp update \
            --name ca-omega-frontend \
            --resource-group ${{ secrets.RG_NAME || 'rg-omega-nexus' }} \
            --image ghcr.io/${{ env.OWNER_LC }}/omega-nexus-frontend:${{ github.sha }}
